<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>Analytics Dashboard</h1>

    <a href="/">
        <button type="button">Back to Home</button>
    </a>
    <a href="/export">
        <button type="button">Export CSV</button>
    </a>

    

    <h2>Top URLs</h2>

    <form method="GET" action="/analytics">
        <input type="text" name="search" placeholder="Search Short Code">
        <button type="submit">Search</button>
    </form>

    <table border="1">
        <tr>
            <th>Short URL</th>
            <th>Original URL</th>
            <th>Clicks</th>
            <th>Delete</th>
            <th>Copy</th>
        </tr>

        {% for row in top_urls %}
        <tr>
            <td>
                <a href="/{{ row[1] }}">
                    http://127.0.0.1:5000/{{ row[1] }}
                </a>
            </td>

            <td>{{ row[2] }}</td>

            <td>{{ row[3] }}</td>

            <td>
                <a href="/delete/{{ row[0] }}">Delete</a>
            </td>

            <td>
                <button class="copy-btn" onclick="copyURL('http://127.0.0.1:5000/{{ row[1] }}')">
                    Copy
                </button>
            </td>
        </tr>
        {% endfor %}
    </table>

    <script>
        function copyURL(url) {
            navigator.clipboard.writeText(url);
            alert("URL Copied!");
        }
    </script>

</body>
</html>
